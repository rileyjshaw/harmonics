<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Harmonics</title>
		<style>
			body { background: #000; font-family: ui-monospace, monospace; }
			button, input, textarea, select { font: inherit; }

			canvas { object-fit: contain; }

			body:not(.formula-editor-open) canvas {
				cursor: none;
			}

			.formula-editor {
				position: fixed;
				top: 12px;
				left: 12px;
				z-index: 1;
				max-width: calc(100vw - 24px);
				color: #fff;
				font-size: 32px;
				line-height: 1.125;
			}

			.formula-editor__row {
				max-width: 100%;
				margin: 0 0 5px;
			}

			.formula-editor__shell {
				display: inline-block;
				max-width: 100%;
				box-sizing: border-box;
				padding: 1px 5px;
				border: 0;
				border-radius: 0;
				background: rgba(0,0,0,0.75);
				color: #fff;
				line-height: 1.125;
				text-align: left;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
			}

			.formula-editor--syntax-error .formula-editor__shell {
				background: rgba(128,0,0,0.75);
			}

			.formula-editor__distance {
				cursor: pointer;
			}

			.formula-editor__value[contenteditable] {
				outline: none;
				caret-color: #fff;
			}

			.resolution-indicator {
				position: fixed;
				right: 12px;
				bottom: 12px;
				z-index: 2;
				padding: 4px 8px;
				background: rgba(0,0,0,0.75);
				color: #fff;
				font-size: 16px;
				line-height: 1.125;
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.2s;
			}
			.resolution-indicator.is-visible { opacity: 1; }
		</style>
	</head>
	<body>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
